<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="meta-desc" content="">
    <title id="page-title"></title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #1a0a0a;
            --foreground: rgba(26, 10, 10, 0.75);
            --highlight: #c44;
            --text: #e0d0d0;
            --primary: #fff;
            --secondary: #000;
            --muted: #8a6a6a;
            --card: #2a1414;
            --border: #4a2a2a;
            --radius: 5px;
            --wave-start: #c44;
            --wave-end: #1a0a0a;
        }
        body.light {
            --background: #f5f0f0;
            --foreground: rgba(230, 220, 220, 0.75);
            --highlight: #a33;
            --text: #2a1a1a;
            --primary: #1a0a0a;
            --secondary: #fff;
            --muted: #7a5a5a;
            --card: #e8d8d8;
            --border: #c0a8a8;
            --wave-start: #a33;
            --wave-end: #f5f0f0;
        }

        @keyframes grain {
            0%, to { transform: translate(0) }
            10% { transform: translate(-5%, -10%) }
            20% { transform: translate(-15%, 5%) }
            30% { transform: translate(7%, -25%) }
            40% { transform: translate(-5%, 25%) }
            50% { transform: translate(-15%, 10%) }
            60% { transform: translate(15%) }
            70% { transform: translateY(15%) }
            80% { transform: translate(3%, 35%) }
            90% { transform: translate(-10%, 10%) }
        }
        body:before {
            content: "";
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='a'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23a)'/%3E%3C/svg%3E");
            opacity: .04;
            z-index: 9999;
            pointer-events: none;
            animation: grain 8s steps(10) infinite;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: var(--background); color: var(--text); font-family: "Montserrat", sans-serif; min-height: 100vh; }
        a { color: var(--text); text-decoration: none; transition: 0.3s; font-weight: 600; }
        a:hover { color: var(--highlight); }
        mark { background-color: var(--highlight); color: var(--background); padding: 0 6px; font-weight: 800; }
        svg.header { display: block; width: 100%; position: absolute; top: -90px; z-index: -1; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 30px; }
        header h2 { color: var(--text); margin: 0; font-size: 16pt; text-transform: uppercase; }
        header nav a { color: var(--primary); margin-left: 20px; text-transform: uppercase; font-size: 12pt; }
        header nav a:hover { border-bottom: 1px solid var(--highlight); color: var(--highlight); }
        main { color: var(--primary); width: 90%; max-width: 900px; margin: 0 auto 80px; background: var(--foreground); border-radius: var(--radius); padding: 40px; }
        .hero { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 40px; }
        .hero img.logo { width: 140px; height: 140px; border-radius: 20px; margin-bottom: 1.2rem; }
        .hero h1 { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; display: inline-block; }
        .hero p { color: var(--muted); max-width: 550px; margin-top: 0.8rem; line-height: 1.7; font-size: 1rem; }
        .downloads { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; margin-bottom: 40px; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.1rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; font-weight: 700; color: var(--text); transition: background 0.15s, border-color 0.15s; }
        .btn:hover { background: var(--highlight); border-color: var(--highlight); color: var(--background); }
        .btn svg { width: 16px; height: 16px; fill: currentColor; }
        .btn-primary { background: var(--highlight); border-color: var(--highlight); color: var(--background); }
        .btn-primary:hover { filter: brightness(1.1); }
        .features h2 { font-size: 1.2rem; text-transform: uppercase; margin-bottom: 1rem; }
        .features ul { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .features li { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.6rem 0.9rem; font-size: 0.85rem; line-height: 1.4; }
        footer { color: var(--primary); position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 30px; font-size: 0.8rem; background: var(--background); }
        footer a { color: var(--text); display: inline-flex; align-items: center; }
        footer a:hover { filter: brightness(1.2); }
        footer svg.personal-logo { width: 22px; height: 22px; margin-left: 4px; vertical-align: middle; }
        footer svg.personal-logo .punk { display: none; }
        footer a:hover svg.personal-logo .punk { display: inline; }
        @media (max-width: 700px) { main { padding: 20px; width: 95%; } .hero h1 { font-size: 2rem; } .features ul { grid-template-columns: 1fr; } header { padding: 20px; flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>
    <svg class="header" xmlns="http://www.w3.org/2000/svg" width="100%" height="272" preserveAspectRatio="xMidYMid" viewBox="0 0 1827 272">
      <defs><linearGradient id="wave-gradient" x1="0" x2="1" y1="0" y2="0"><stop stop-color="var(--wave-start)" offset="0" /><stop stop-color="var(--wave-end)" offset="1" /></linearGradient></defs>
      <g transform="translate(913.5,144) scale(-1,1) translate(-913.5,-144)">
        <path d="" fill="url(#wave-gradient)" opacity="0.4"><animate attributeName="d" dur="10s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1" keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1" calcMode="spline" values="M0 0L 0 282Q 183 281 365 247T 731 164T 1096 148T 1462 62T 1827 13L 1827 0Z;M0 0L 0 297Q 183 242 365 225T 731 164T 1096 102T 1462 56T 1827 -8L 1827 0Z;M0 0L 0 278Q 183 246 365 213T 731 188T 1096 123T 1462 38T 1827 -34L 1827 0Z;M0 0L 0 282Q 183 281 365 247T 731 164T 1096 148T 1462 62T 1827 13L 1827 0Z" /></path>
        <path d="" fill="url(#wave-gradient)" opacity="0.4"><animate attributeName="d" dur="10s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1" keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1" calcMode="spline" begin="-2s" values="M0 0L 0 293Q 183 271 365 236T 731 176T 1096 134T 1462 33T 1827 -6L 1827 0Z;M0 0L 0 299Q 183 294 365 257T 731 167T 1096 99T 1462 90T 1827 -4L 1827 0Z;M0 0L 0 309Q 183 293 365 256T 731 156T 1096 95T 1462 48T 1827 4L 1827 0Z;M0 0L 0 293Q 183 271 365 236T 731 176T 1096 134T 1462 33T 1827 -6L 1827 0Z" /></path>
        <path d="" fill="url(#wave-gradient)" opacity="0.4"><animate attributeName="d" dur="10s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1" keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1" calcMode="spline" begin="-4s" values="M0 0L 0 283Q 183 253 365 227T 731 148T 1096 127T 1462 62T 1827 -35L 1827 0Z;M0 0L 0 280Q 183 269 365 224T 731 207T 1096 145T 1462 50T 1827 29L 1827 0Z;M0 0L 0 291Q 183 301 365 258T 731 174T 1096 85T 1462 38T 1827 -2L 1827 0Z;M0 0L 0 283Q 183 253 365 227T 731 148T 1096 127T 1462 62T 1827 -35L 1827 0Z" /></path>
        <path d="" fill="url(#wave-gradient)" opacity="0.4"><animate attributeName="d" dur="10s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1" keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1" calcMode="spline" begin="-6s" values="M0 0L 0 322Q 183 287 365 241T 731 182T 1096 117T 1462 107T 1827 25L 1827 0Z;M0 0L 0 301Q 183 281 365 258T 731 207T 1096 140T 1462 54T 1827 30L 1827 0Z;M0 0L 0 318Q 183 272 365 231T 731 173T 1096 118T 1462 19T 1827 -26L 1827 0Z;M0 0L 0 322Q 183 287 365 241T 731 182T 1096 117T 1462 107T 1827 25L 1827 0Z" /></path>
        <path d="" fill="url(#wave-gradient)" opacity="0.4"><animate attributeName="d" dur="10s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1" keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1" calcMode="spline" begin="-8s" values="M0 0L 0 320Q 183 248 365 226T 731 185T 1096 154T 1462 81T 1827 28L 1827 0Z;M0 0L 0 278Q 183 287 365 241T 731 183T 1096 114T 1462 28T 1827 -18L 1827 0Z;M0 0L 0 274Q 183 305 365 265T 731 189T 1096 116T 1462 71T 1827 37L 1827 0Z;M0 0L 0 320Q 183 248 365 226T 731 185T 1096 154T 1462 81T 1827 28L 1827 0Z" /></path>
      </g>
    </svg>

    <header>
        <h2 id="header-title"></h2>
        <nav>
            <a href="javascript:toggleLightMode();">&#127767;</a>
            <a id="nav-source" href="#">Source</a>
            <a id="nav-changelog" href="#">Changelog</a>
        </nav>
    </header>

    <main role="main">
        <div class="hero">
            <img class="logo" src="logo.png" id="hero-logo" alt="">
            <h1 id="hero-title"></h1>
            <p id="hero-desc"></p>
        </div>
        <div class="downloads" id="downloads"></div>
        <div class="features">
            <h2>Features</h2>
            <ul id="features-list"></ul>
        </div>
    </main>

    <footer>
        <b>&copy; <script>document.write(new Date().getFullYear())</script>++</b>
        <a href="https://andrewkidd.co.uk" target="_blank" rel="noopener" title="andrewkidd.co.uk">
            <svg class="personal-logo" xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 230 230">
                <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="8" />
                <g stroke="currentColor" stroke-width="6.4" stroke-linecap="round">
                    <line x1="163.6" y1="36.4" x2="36.4" y2="163.6" />
                    <line x1="36.4" y1="163.6" x2="100" y2="10" />
                    <line x1="100" y1="100" x2="163.6" y2="163.6" />
                    <line x1="100" y1="10" x2="100" y2="190" />
                </g>
                <g class="punk" stroke="currentColor" stroke-width="6.4" stroke-linecap="round">
                    <line x1="163.6" y1="36.4" x2="177.7" y2="22.3" />
                    <line x1="36.4" y1="163.6" x2="22.3" y2="177.7" />
                    <line x1="36.4" y1="163.6" x2="28.7" y2="182.1" />
                    <line x1="100" y1="10" x2="107.7" y2="-8.5" />
                    <line x1="163.6" y1="163.6" x2="177.7" y2="177.7" />
                    <line x1="100" y1="10" x2="100" y2="-10" />
                    <line x1="100" y1="190" x2="100" y2="210" />
                </g>
            </svg>
        </a>
    </footer>

    <script>
        fetch("site.json").then(function(r) { return r.json(); }).then(function(site) {
            // Theme
            if (site.theme) {
                var root = document.documentElement;
                Object.keys(site.theme).forEach(function(k) {
                    root.style.setProperty("--" + k, site.theme[k]);
                });
            }

            // Meta
            document.getElementById("page-title").textContent = site.title;
            document.getElementById("meta-desc").setAttribute("content", site.description);

            // Header
            document.getElementById("header-title").textContent = site.title;
            document.getElementById("nav-source").href = site.source;
            if (site.repo) {
                document.getElementById("nav-changelog").href = "https://github.com/" + site.repo + "/blob/HEAD/CHANGELOG.md";
            }

            // Hero
            document.getElementById("hero-logo").alt = site.title + " icon";
            document.getElementById("hero-title").innerHTML = site.title_html || site.title;
            document.getElementById("hero-desc").innerHTML = site.description_html || site.description;

            // Downloads
            var dl = document.getElementById("downloads");
            (site.downloads || []).forEach(function(d) {
                var a = document.createElement("a");
                a.className = "btn" + (d.primary ? " btn-primary" : "");
                if (d.href) {
                    a.href = d.href;
                } else if (d.release_file) {
                    a.href = "https://github.com/" + site.repo + "/releases/download/latest-main/" + d.release_file;
                }
                if (d.icon) {
                    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svg.setAttribute("viewBox", "0 0 24 24");
                    var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", d.icon);
                    svg.appendChild(path);
                    a.appendChild(svg);
                }
                a.appendChild(document.createTextNode(d.label));
                dl.appendChild(a);
            });

            // Features
            var ul = document.getElementById("features-list");
            (site.features || []).forEach(function(f) {
                var li = document.createElement("li");
                li.innerHTML = f;
                ul.appendChild(li);
            });
        });

        function toggleLightMode() {
            document.body.classList.toggle("light");
            localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
            updateWaveColors();
        }
        function updateWaveColors() {
            var style = getComputedStyle(document.documentElement);
            var stops = document.querySelectorAll("#wave-gradient stop");
            if (stops.length >= 2) {
                stops[0].setAttribute("stop-color", style.getPropertyValue("--wave-start").trim());
                stops[1].setAttribute("stop-color", style.getPropertyValue("--wave-end").trim());
            }
        }
        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light");
            updateWaveColors();
        }
    </script>
</body>
</html>
